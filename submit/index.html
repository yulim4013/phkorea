<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PH Korea 2026 · Document Submission</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
      background: #F2F2F7;
      min-height: 100vh;
    }
    .wrap { max-width: 430px; margin: 0 auto; padding-bottom: 48px; }

    /* ── top bar ── */
    .top-bar {
      background: #1B3A5C;
      color: #fff;
      text-align: center;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      border-radius: 0 0 14px 14px;
      margin: 0 16px;
    }

    /* ── lang toggle ── */
    .lang-wrap {
      display: flex;
      margin: 12px 16px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid #E5E5EA;
      background: #fff;
    }
    .lang-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: #fff;
      color: #636366;
      transition: all .2s;
    }
    .lang-btn.active { background: #1B3A5C; color: #fff; }

    /* ── card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px;
      margin: 12px 16px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card-title { font-size: 17px; font-weight: 700; color: #1C1C1E; margin-bottom: 8px; }
    .card-sub { font-size: 13px; color: #636366; line-height: 1.6; margin-bottom: 20px; }

    /* ── step indicator ── */
    .step-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 16px 4px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #E5E5EA;
      transition: all .3s;
    }
    .step-dot.active { background: #1B3A5C; width: 24px; border-radius: 4px; }
    .step-dot.done { background: #34C759; }
    .step-label {
      font-size: 12px; color: #8E8E93;
      text-align: center;
      padding: 4px 16px 0;
    }

    /* ── form fields ── */
    .field-label { font-size: 13px; color: #8E8E93; display: block; margin-bottom: 6px; margin-top: 14px; }
    .field-label .req { color: #FF3B30; }
    .field-input, .field-select, .field-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E5E5EA;
      border-radius: 10px;
      font-size: 16px;
      color: #1C1C1E;
      outline: none;
      transition: border-color .2s;
      background: #fff;
      font-family: inherit;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: #1B3A5C; }
    .field-textarea { resize: vertical; min-height: 80px; }
    .field-row { display: flex; gap: 10px; }
    .field-row > * { flex: 1; }
    .field-hint { font-size: 11px; color: #8E8E93; margin-top: 4px; }

    /* ── radio / checkbox group ── */
    .radio-group, .check-group { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .radio-item, .check-item {
      padding: 10px 16px;
      border: 1.5px solid #E5E5EA;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
      user-select: none;
    }
    .radio-item.sel, .check-item.sel { border-color: #1B3A5C; background: #EDF1F7; color: #1B3A5C; font-weight: 600; }

    /* ── date picker ── */
    .date-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-top: 8px; }
    .date-cell {
      padding: 10px 4px;
      text-align: center;
      border: 1.5px solid #E5E5EA;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      user-select: none;
    }
    .date-cell:hover { border-color: #1B3A5C; }
    .date-cell.sel { border-color: #1B3A5C; background: #1B3A5C; color: #fff; }
    .date-cell.disabled { opacity: .3; pointer-events: none; }
    .date-cell.excess { opacity: .4; cursor: not-allowed; background: #F2F2F7; }
    .date-cell .dw { font-size: 10px; color: #8E8E93; }
    .date-cell.sel .dw { color: rgba(255,255,255,.7); }

    /* ── file box ── */
    .file-row { margin-bottom: 14px; }
    .file-box {
      border: 2px dashed #E5E5EA;
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .file-box:hover { border-color: #1B3A5C; }
    .file-box.has-file { border-color: #34C759; background: #F0FFF4; }
    .file-box.has-prev { border-color: #007AFF; background: #F0F4FF; }
    .file-box .fi { font-size: 26px; margin-bottom: 6px; }
    .file-box .fl { font-size: 14px; font-weight: 600; color: #1B3A5C; }
    .file-box.has-file .fl { color: #34C759; }
    .file-box.has-prev .fl { color: #007AFF; }
    .file-box .fh { font-size: 12px; color: #8E8E93; margin-top: 3px; }
    .file-box .fn { font-size: 12px; color: #1C1C1E; margin-top: 6px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px; }
    .file-box .prev-info { font-size: 11px; color: #007AFF; margin-top: 4px; }
    .file-box input[type=file] { display: none; }

    /* ── event check ── */
    .event-row { display: flex; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid #F2F2F7; }
    .event-row:last-child { border-bottom: none; }
    .event-check {
      width: 22px; height: 22px; border: 2px solid #C7C7CC; border-radius: 6px; margin-right: 12px;
      flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; margin-top: 2px;
    }
    .event-check.checked { background: #1B3A5C; border-color: #1B3A5C; }
    .event-check.checked::after { content: ''; width: 6px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }
    .event-info { flex: 1; }
    .event-name { font-size: 15px; font-weight: 600; color: #1C1C1E; }
    .event-detail { font-size: 12px; color: #8E8E93; margin-top: 2px; }

    /* ── buttons ── */
    .btn-row { display: flex; gap: 10px; margin: 16px 16px 0; }
    .btn {
      flex: 1;
      padding: 16px;
      background: #1B3A5C;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      letter-spacing: -0.3px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .8; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-back {
      flex: 0 0 auto;
      width: 56px;
      padding: 16px 0;
      background: #E5E5EA;
      color: #636366;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    /* ── result ── */
    .result-wrap { text-align: center; padding: 48px 24px 24px; margin: 12px 16px 0; }
    .result-icon { font-size: 60px; margin-bottom: 16px; }
    .result-title { font-size: 21px; font-weight: 800; color: #1C1C1E; margin-bottom: 10px; }
    .result-msg { font-size: 15px; color: #636366; line-height: 1.65; }
    .result-msg a { color: #1B3A5C; text-decoration: none; }

    /* ── popup ── */
    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .popup-overlay.show { display: flex; }
    .popup-box {
      background: #fff; border-radius: 16px; padding: 24px 20px;
      max-width: 320px; width: 90%; text-align: center;
    }
    .popup-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .popup-msg { font-size: 14px; color: #636366; line-height: 1.6; margin-bottom: 16px; }
    .popup-btn {
      padding: 12px 24px; background: #1B3A5C; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ── overlay / spinner ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── toast ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1C1C1E; color: #fff; padding: 12px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 200; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

// ── 유틸 ──
const g = id => document.getElementById(id);
const t = key => L[lang][key] || key;
function showOverlay(on) { g('overlay').classList.toggle('show', on); }
function showToast(msg) { const el=g('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800); }
function showPopup(title, msg) { g('popup-title').textContent=title; g('popup-msg').textContent=msg; g('popup').classList.add('show'); }
function closePopup() { g('popup').classList.remove('show'); }

function setLang(l) {
  lang = l;
  g('lang-ko').classList.toggle('active', l==='ko');
  g('lang-en').classList.toggle('active', l==='en');
  g('top-bar').textContent = t('topBar');
  render();

function fileToBase64(file) {
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// ── 스텝 바 ──
function renderStepBar() {
  const wrap = g('step-bar-wrap');
  if (step === 0 || STEPS[step] === 'dashboard' || STEPS[step] === 'done' || STEPS[step] === 'closed' || STEPS[step] === 'error') {
    wrap.innerHTML = '';
    return;
  }
  const names = STEP_NAMES[lang];
  let dots = '<div class="step-bar">';
  for (let i = 1; i < STEPS.length - 1; i++) { // skip verify & done
    let cls = 'step-dot';
    if (i < step) cls += ' done';
    else if (i === step) cls += ' active';
    dots += `<div class="${cls}"></div>`;
  }
  dots += '</div>';
  dots += `<div class="step-label">${names[step]}</div>`;
  wrap.innerHTML = dots;
}

// ── 날짜 유틸 ──
function parseDateStr(s) {
  if (!s) return null;
  return new Date(s);
}
function formatDateShort(d) {
  const m = d.getMonth()+1;
  const day = d.getDate();
  const dw = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  return { label: `${m}/${day}`, dw: dw, iso: d.toISOString().split('T')[0] };
}
function dateRange(start, end) {
  const dates = [];
  const d = new Date(start);
  const e = new Date(end);
  while (d <= e) { dates.push(new Date(d)); d.setDate(d.getDate()+1); }
  return dates;
}

// ── 메인 렌더 ──
function render() {
  renderStepBar();
  const app = g('app');
  const view = STEPS[step];

  if (view === 'verify') renderVerify(app);
  else if (view === 'dashboard') renderDashboard(app);
  else if (view === 'personal') renderPersonal(app);
  else if (view === 'accommodation') renderAccommodation(app);
  else if (view === 'cv') renderCV(app);
  else if (view === 'files') renderFiles(app);
  else if (view === 'events') renderEvents(app);
  else if (view === 'done') renderDone(app);
}

// ── Step: Verify ──
function renderVerify(app) {
  app.innerHTML = `
    <div class="card">
      <div class="card-title">${t('verifyTitle')}</div>
      <div class="card-sub">${t('verifySub')}</div>
      <label class="field-label">${t('emailLabel')}</label>
      <input type="email" class="field-input" id="email-input" placeholder="${t('emailPlaceholder')}" autocomplete="email">
    </div>
    <div class="btn-row"><button class="btn" id="verify-btn">${t('verifyBtn')}</button></div>`;
  const input = g('email-input');
  const btn = g('verify-btn');
  input.addEventListener('keydown', e => { if(e.key==='Enter') btn.click(); });
  btn.addEventListener('click', async () => {
    const email = input.value.trim();
    if (!email || !email.includes('@')) { showToast(t('invalidEmail')); return; }
    S.email = email;
    showOverlay(true);
    try {
      const res = await fetch(`${GAS_URL}?action=checkEmail&email=${encodeURIComponent(email)}`);
      const json = await res.json();
      showOverlay(false);
      if (json.status === 'ok') {
        S.name = json.name || '';
        S.affiliation = json.affiliation || '';
        S.country = json.country || '';
        // 국가 기준 언어 자동 잠금: Korea면 한국어 고정, 그 외(빈 값 포함)는 영어 고정
        var c = (S.country || '').toString().trim();
        var forceLang = (c === 'Korea' || c === '대한민국' || c === 'KR' || c === 'KOR') ? 'ko' : 'en';
        setLang(forceLang);
        // 언어 토글 숨김
        var lw = g('lang-wrap');
        if (lw) lw.style.display = 'none';
        S.required = json.required || {};
        S.sections = json.sections || {};
        S.submitted = json.submitted || {};
        S.socialEvents = json.socialEvents || [];
        S.accommodation = json.accommodation || null;
        S.files = {};
        S.eventChecks = {};
        for (const ev of S.socialEvents) { if (ev.attending) S.eventChecks[ev.id] = true; }
        // 기존 reply/cv 데이터 복원
        if (json.reply) {
          for (const k in json.reply) { if (S.form.hasOwnProperty(k)) S.form[k] = json.reply[k] || S.form[k]; }
        }
        step = STEPS.indexOf('dashboard');
      } else if (json.status === 'closed') {
        S.view = 'closed'; step = STEPS.length - 1;
        app.innerHTML = '<div class="result-wrap"><div class="result-icon">\u23F0</div><div class="result-title">' + t('closedTitle') + '</div><div class="result-msg">' + t('closedMsg').replace(/\n/g,'<br>') + '<br><br><a href="mailto:' + t('contactEmail') + '">' + t('contactEmail') + '</a></div></div>';
        showOverlay(false); return;
      } else {
        app.innerHTML = '<div class="result-wrap"><div class="result-icon">\u274C</div><div class="result-title">' + t('errorTitle') + '</div><div class="result-msg">' + t('errorMsg').replace(/\n/g,'<br>') + '<br><br><a href="mailto:' + t('contactEmail') + '">' + t('contactEmail') + '</a></div></div><div class="btn-row"><button class="btn" onclick="step=0;render()">' + t('retryBtn') + '</button></div>';
        showOverlay(false); return;
      }
      render();
    } catch(err) { showOverlay(false); showToast(t('toastError')); }
  });
}

// ── Step: Dashboard ──
function renderDashboard(app) {
  var items = [];
  var sec = S.sections || {};

  // 1. 인적정보 (특이식단 포함)
  var personalDone = !!(S.form.firstName && S.form.lastName && S.form.country);
  items.push({ label: lang==='ko'?'인적정보':'Personal Info', step: 'personal', done: personalDone, expired: sec.replyForm && sec.replyForm.expired });

  // 2. 숙박
  if (sec.accommodation && sec.accommodation.target) {
    var accomDone = !!(S.form.checkinDate && S.form.checkoutDate);
    items.push({ label: lang==='ko'?'숙박 일정':'Accommodation', step: 'accommodation', done: accomDone, expired: sec.accommodation.expired });
  }

  // 3. CV (대상일 때만 표시)
  if (sec.cv && sec.cv.target) {
    var cvDone = !!(S.form.education || S.form.career || S.form.research || S.form.papers);
    items.push({ label: 'CV', step: 'cv', done: cvDone, expired: sec.cv.expired });
  }

  // 5. 서류 제출 (모든 필수 파일이 제출되면 완료)
  var fileKeys = ['abstract', 'photo', 'passport', 'taxcert'];
  var anyFileTarget = false;
  var allFilesDone = true;
  var anyFileExpired = false;
  for (var fi = 0; fi < fileKeys.length; fi++) {
    var req = S.required[fileKeys[fi]];
    if (req && req.target) {
      anyFileTarget = true;
      if (req.expired) anyFileExpired = true;
      var done = !!(S.submitted[fileKeys[fi]] && S.submitted[fileKeys[fi]].name) || !!S.files[fileKeys[fi]];
      if (!done) allFilesDone = false;
    }
  }
  if (anyFileTarget) {
    items.push({ label: lang==='ko'?'서류 제출':'Documents', step: 'files', done: allFilesDone, expired: anyFileExpired });
  }

  // 6. 사교행사 (대상인 경우만)
  if (sec.events && sec.events.target) {
    var evDone = false;
    for (var k in S.eventChecks) { if (S.eventChecks[k] !== undefined) { evDone = true; break; } }
    items.push({ label: lang==='ko'?'사교행사':'Social Events', step: 'events', done: evDone, expired: false });
  }

  // 완료 카운트
  var doneCount = 0;
  for (var i = 0; i < items.length; i++) { if (items[i].done) doneCount++; }
  var pct = items.length > 0 ? Math.round(doneCount / items.length * 100) : 0;

  var html = '<div class="card"><div class="card-title">' + S.name + (lang==='ko'?' 님, 환영합니다!':',  welcome!') + '</div>';
  html += '<div class="card-sub">' + (lang==='ko'?'아래 항목을 확인하고 제출해주세요.':'Please review and submit the items below.') + '</div>';
  // 진행률
  html += '<div style="margin-bottom:16px;">';
  html += '<div style="display:flex;justify-content:space-between;font-size:12px;color:#8E8E93;margin-bottom:4px;"><span>' + (lang==='ko'?'제출 현황':'Progress') + '</span><span>' + doneCount + '/' + items.length + '</span></div>';
  html += '<div style="height:8px;background:#E5E5EA;border-radius:4px;overflow:hidden;"><div style="height:100%;background:#34C759;border-radius:4px;width:' + pct + '%;transition:width .4s;"></div></div>';
  html += '</div>';

  // 항목 리스트
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var icon = it.done ? '\u2705' : '\u2B55';
    var statusText = '';
    if (it.expired) {
      icon = '\u23F0';
      statusText = '<span style="font-size:11px;color:#FF3B30;margin-left:8px;">' + (lang==='ko'?'마감':'Closed') + '</span>';
    } else if (it.done) {
      statusText = '<span style="font-size:11px;color:#34C759;margin-left:8px;">' + (lang==='ko'?'완료':'Done') + '</span>';
    }
    var clickAttr = !it.expired ? ' data-step="' + it.step + '" style="cursor:pointer;"' : ' style="opacity:0.5;"';
    html += '<div class="dash-item event-row"' + clickAttr + '>';
    html += '<div style="font-size:20px;margin-right:12px;flex-shrink:0;">' + icon + '</div>';
    html += '<div style="flex:1;"><div class="event-name">' + it.label + statusText + '</div></div>';
    if (!it.expired) html += '<div style="color:#C7C7CC;font-size:18px;">&rsaquo;</div>';
    html += '</div>';
  }
  html += '</div>';

  // 전체 제출 버튼
  html += '<div class="btn-row"><button class="btn" onclick="submitAll()">' + t('submit') + '</button></div>';

  app.innerHTML = html;
  // 대시보드 항목 클릭 바인딩
  var dashItems = document.querySelectorAll('.dash-item');
  for (var d = 0; d < dashItems.length; d++) {
    dashItems[d].addEventListener('click', function() {
      var s = this.getAttribute('data-step');
      if (s) goToStep(s);
    });
  }
}

  if (S.accommodation && !S.form.checkoutDate) { showToast(lang==='ko'?'체크아웃 날짜를 선택해주세요':'Please select check-out date'); return; }

// ── Step: CV ──
function renderCV(app) {
  const f = S.form;
  const fields = [
    {key:'education', label:t('education')},
    {key:'career', label:t('career')},
    {key:'research', label:t('research')},
    {key:'papers', label:t('papers')},

  let html = `<div class="card"><div class="card-title">${t('cvTitle')}</div><div class="card-sub">${t('cvSub')}</div>`;

    html += `<label class="field-label">${fd.label}</label>
    <textarea class="field-textarea" id="f-${fd.key}" rows="4" placeholder="${t('cvPlaceholder')}">${esc(f[fd.key])}</textarea>`;
  }
  html += `</div>
  <div class="btn-row">
    <button class="btn-back" onclick="goBack()">${t('back')}</button>
    <button class="btn" onclick="saveCV()">${t('next')}</button>
  </div>`;
  app.innerHTML = html;
}
function saveCV() {
  S.form.education = g('f-education').value;
  S.form.career = g('f-career').value;
  S.form.research = g('f-research').value;
  S.form.papers = g('f-papers').value;
  goToDashboard();
}

// ── Step: Files ──
function renderFiles(app) {
  let html = `<div class="card"><div class="card-title">${t('filesTitle')}</div><div class="card-sub">${t('filesSub')}</div>`;
  for (const [key, cfg] of Object.entries(FILE_ITEMS)) {
    const req = S.required[key];
    if (!req || !req.target) continue; // 미대상이면 미노출
    const isExpired = req.expired;

    const sub = S.submitted[key];
    const newFile = S.files[key];
    const hasPrev = sub && sub.name;
    const hasNew = !!newFile;
    let boxClass = 'file-box';
    let labelText = t('fileSelect');
    let nameText = '';
    let prevHTML = '';
    if (hasNew) { boxClass+=' has-file'; labelText=t('fileSelected'); nameText=newFile.name; if(hasPrev) prevHTML=`<div class="prev-info">${t('filePrev')}: ${sub.name}</div>`; }
    else if (hasPrev) { boxClass+=' has-prev'; labelText=`${t('filePrev')} (${sub.date})`; nameText=sub.name; prevHTML=`<div class="prev-info">${t('fileReplace')}</div>`; }

    html += `<div class="file-row">
      <label class="field-label">${t(key+'Label')}</label>
      <div class="${boxClass}" id="${key}-box" onclick="g('${key}-input').click()">
        <div class="fi">${cfg.icon}</div>
        <div class="fl">${labelText}</div>
        <div class="fh">${t(key+'Hint')} · ${t('fileMax')} ${cfg.maxMB}MB</div>
        <div class="fn">${nameText}</div>${prevHTML}
        <input type="file" id="${key}-input" accept="${cfg.accept}">
      </div></div>`;
  }
  html += `</div>
  <div class="btn-row">
    <button class="btn-back" onclick="goToDashboard()">${t('back')}</button>
    <button class="btn" onclick="goToDashboard()">${lang==='ko'?'저장':'Save'}</button>
  </div>`;
  app.innerHTML = html;

  // 파일 바인딩
  for (const [key, cfg] of Object.entries(FILE_ITEMS)) {
    const el = g(key+'-input');
    if (!el) continue;
    el.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      if (file.size > cfg.maxMB*1024*1024) { showToast(t('toastFileTooLarge')); this.value=''; return; }
      S.files[key] = file;
      render();
    });
  }
}

// ── Step: Events ──

  const f = S.form;
  const enabled = S.socialEvents.filter(ev => ev.enabled);
  let evHTML = '';
  for (const ev of enabled) {
    const evName = lang==='ko' ? ev.name_ko : ev.name_en;
    const evVenue = lang==='ko' ? ev.venue_ko : ev.venue_en;
    const attending = S.eventChecks[ev.id];
    evHTML += `<div style="padding:14px 0;border-bottom:1px solid #F2F2F7;">
      <div class="event-name">${evName}</div>
      <div class="event-detail" style="margin-bottom:8px;">${ev.date}${evVenue?' · '+evVenue:''}</div>
      <div class="radio-group">
        <div class="radio-item ${attending===true?'sel':''}" onclick="S.eventChecks['${ev.id}']=true;render()">Y</div>
        <div class="radio-item ${attending===false?'sel':''}" onclick="S.eventChecks['${ev.id}']=false;render()">N</div>
      </div>
    </div>`;
  }
  app.innerHTML = `
    <div class="card">
      <div class="card-title">${t('eventsTitle')}</div>
      <label class="field-label">${lang==='ko'?'동반자 영문 이름 (없으면 비워두세요)':'Companion Name in English (leave blank if none)'}</label>
      <input class="field-input" value="${esc(f.companionName)}" onchange="S.form.companionName=this.value.trim();render()">
      ${f.companionName ? `
      <label class="field-label">${lang==='ko'?'동반자 특이식단':'Companion Dietary'}</label>
      <div class="radio-group">
        ${['none','vegetarian','halal'].map(o=>'<div class="radio-item '+(f.dietCompanion===o?'sel':'')+'" onclick="S.form.dietCompanion=\''+o+'\';render()">'+t(o)+'</div>').join('')}
      </div>` : ''}
      <div style="margin-top:20px;">
        <div class="card-title" style="font-size:15px;">${lang==='ko'?'참석 여부':'Attendance'}</div>
        ${evHTML || '<p style="color:#8E8E93;font-size:14px;">No events available</p>'}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-back" onclick="goToDashboard()">${t('back')}</button>
      <button class="btn" onclick="goToDashboard()">${lang==='ko'?'저장':'Save'}</button>
    </div>`;
}

// ── 제출 ──
async function submitAll() {
  showOverlay(true);
  try {
    // 파일 base64 변환 병렬 처리
    var fileEntries = [];
    var fileKeysAll = Object.keys(S.files);
    for (var fki = 0; fki < fileKeysAll.length; fki++) {
      var fk = fileKeysAll[fki];
      if (S.files[fk]) fileEntries.push({ key: fk, file: S.files[fk] });
    }
    var filePayloads = {};
    await Promise.all(fileEntries.map(function(fe) {
      return fileToBase64(fe.file).then(function(b64) {
        filePayloads[fe.key] = { name: fe.file.name, type: fe.file.type, data: b64 };
      });
    }));
    const payload = {
      email: S.email,
      name: S.name,
      form: S.form,
      files: filePayloads,
      events: S.eventChecks,
      eventCompanions: S.eventCompanions || {},
    };
    await fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
    showOverlay(false);
    step = STEPS.indexOf('done');
    render();
  } catch(err) { showOverlay(false); showToast(t('toastError')); }
}

// ── 네비게이션 ──
function goBack() {
  step = STEPS.indexOf('dashboard');
  render();
}
function goToDashboard() {
  step = STEPS.indexOf('dashboard');
  render();
}
function goToStep(name) {
  step = STEPS.indexOf(name);
  render();
}

// ── 이스케이프 ──
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 초기 렌더 ──
render();
</script>
